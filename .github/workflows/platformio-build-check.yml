name: Build(platformio)

on:
  push:
    tags-ignore:
      - '*.*.*'
      - 'v*.*.*'
    branches:
      - '*'
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'test/**.cpp'
      - 'test/**.hpp'
      - 'test/**.h'
      - 'test/**.c'
      - '.github/workflows/platformio-build-check.yml'
      - '.github/compile_check/**'
      - 'platformio.ini'
  pull_request:
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'test/**.cpp'
      - 'test/**.hpp'
      - 'test/**.h'
      - 'test/**.c'
      - '.github/workflows/platformio-build-check.yml'
      - '.github/compile_check/**'
      - 'platformio.ini'
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  native-test:
    name: Native:Test
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Run native tests
        run: |
          pio test -e test_native -vv --project-dir ./ --project-conf ./platformio.ini

      - name: Run native tests (no-chrono fallback)
        run: |
          pio test -e test_native_nochrono -vv --project-dir ./ --project-conf ./platformio.ini

  build-non-esp32:
    name: NonESP32:${{ matrix.board }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      matrix:
        board:
          # SAMD21 (atmelsam platform, Arduino core)
          - zeroUSB
          # RP2040 (raspberrypi platform, mbed Arduino core)
          - pico
          # Renesas RA4M1 (renesas-ra platform, Arduino UNO R4 core)
          - uno_r4_wifi
          # ESP8266 (espressif8266 platform; covers the ESP8266-specific TL_ASSERT path in stl/expected.hpp)
          - d1_mini

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Compile check
        run: |
          pio ci .github/compile_check --lib="." --board=${{ matrix.board }}

  avr-expected-error:
    name: AVR:ExpectedError
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      # AVR has no C++ standard library; the build must fail, and must fail
      # with the single clear #error from platform_detect.hpp
      - name: Expect the defined error on AVR
        run: |
          set +e
          output=$(pio ci .github/compile_check --lib="." --board=uno 2>&1)
          status=$?
          set -e
          echo "$output" | tail -20
          if [ "$status" -eq 0 ]; then
            echo "::error::AVR build unexpectedly succeeded"
            exit 1
          fi
          if ! echo "$output" | grep -q "M5Utility requires the C++ standard library"; then
            echo "::error::AVR build failed without the expected #error diagnostic"
            exit 1
          fi
          echo "OK: AVR fails with the intended one-line diagnostic"

  build:
    name: ${{ matrix.board }}:${{ matrix.framework }}:${{ matrix.espressif32 }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      max-parallel: 20
      
      matrix:
        board:
          - Core
          - Core2
          - CoreS3
          - Fire
          - StampS3
          - Dial
          - Atom
          - AtomS3
          - AtomS3R
          - NanoC6
          - NanoH2
          - NessoN1
          - StickCPlus
          - StickCPlus2
          - StickS3
          - Cardputer
          - Paper
          - CoreInk
          - Tab5

        framework:
          - Arduino

        espressif32:
          - latest
#          - '5_4_0'
#          - '4_4_0'

#        exclude:
#          - board: CoreS3
#            espressif32: '5_4_0'
#          - board: CoreS3
#            espressif32: '4_4_0'
#          - board: StampS3
#            espressif32: '5_4_0'
#          - board: StampS3
#            espressif32: '4_4_0'
#          - board: AtomS3
#            espressif32: '5_4_0'
#          - board: AtomS3
#            espressif32: '4_4_0'
#          - board: Dial
#            espressif32: '5_4_0'
#          - board: Dial
#            espressif32: '4_4_0'
#          - board: NanoC6
#            espressif32: '5_4_0'
#          - board: NanoC6
#            espressif32: '4_4_0'
#          - board: StickCPlus
#            espressif32: '5_4_0'
#          - board: StickCPlus
#            espressif32: '4_4_0'
#          - board: Paper
#            espressif32: '5_4_0'
#          - board: Paper
#            espressif32: '4_4_0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build examples
        uses: m5stack/M5Utility/.github/actions/pio_test_build@develop
        with:
          environments: test_${{ matrix.board }}
