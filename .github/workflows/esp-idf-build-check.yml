name: Build(esp-idf-native)

on:
  push:
    tags-ignore:
      - '*.*.*'
      - 'v*.*.*'
    branches:
      - '*'
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'CMakeLists.txt'
      - 'idf_component.yml'
      - '.github/esp_idf_check/**'
      - '.github/workflows/esp-idf-build-check.yml'
  pull_request:
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - 'CMakeLists.txt'
      - 'idf_component.yml'
      - '.github/esp_idf_check/**'
      - '.github/workflows/esp-idf-build-check.yml'
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}:${{ matrix.idf }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 20

      matrix:
        # IDF boundary versions: oldest supported minor / new-driver generation / latest
        idf:
          - v5.1.7
          - v5.4.4
          - v5.5.4
        # Cross design: esp32 (classic) / esp32c6 (single-core representative) / esp32p4 (newest)
        target:
          - esp32
          - esp32c6
          - esp32p4
        exclude:
          # ESP32-P4 is GA since IDF v5.3
          - target: esp32p4
            idf: v5.1.7

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf }}
          target: ${{ matrix.target }}
          path: .github/esp_idf_check
