name: Build(arduino-esp32:2.x)

on:
  push:
    tags-ignore:
      - '*.*.*'
      - 'v*.*.*'
    branches:
      - '*'
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - '.github/arduino_compile_check/**'
      - '.github/workflows/arduino-esp-v2-build-check.yml'
  pull_request:
    paths:
      - 'src/**.cpp'
      - 'src/**.hpp'
      - 'src/**.h'
      - 'src/**.c'
      - '.github/arduino_compile_check/**'
      - '.github/workflows/arduino-esp-v2-build-check.yml'
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.board }}@${{ matrix.platform-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    strategy:
      fail-fast: false
      max-parallel: 20

      matrix:
        platform-url:
          - https://espressif.github.io/arduino-esp32/package_esp32_index.json

        # Cross design: M5Utility has no board-specific code, so one board per
        # chip generation is enough (siblings kept commented out)
        board:
          - m5stack-core-esp32
          - m5stack-cores3
#          - m5stack-atom
#          - m5stack-atoms3
#          - m5stack-core2
#          - m5stack-coreink
#          - m5stack-fire

        platform-version:
          - 2.0.17

        platform:
          - esp32

        archi:
          - esp32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile check
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.platform }}:${{ matrix.archi }}:${{ matrix.board }}
          platforms: |
            - name: ${{ matrix.platform }}:${{ matrix.archi }}
              source-url: ${{ matrix.platform-url }}
              version: ${{ matrix.platform-version }}
          libraries: |
            - source-path: ./
          sketch-paths: |
            - .github/arduino_compile_check
