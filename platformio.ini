;-----------------------------------------------------------------------
; M5Utility
; For UnitTest
;-----------------------------------------------------------------------
[platformio]
;default_envs = test_Core, test_Core2, test_CoreS3, test_Fire, test_StampS3, test_Dial, test_AtomS3, test_NanoC6, test_StickCPlus, test_Paper

[env]
build_flags =-Wall -Wextra -Wreturn-local-addr -Werror=format -Werror=return-local-addr
lib_ldf_mode = deep
test_framework = googletest
test_build_src = true
lib_deps=google/googletest@1.12.1

; --------------------------------
;Choose device
[m5base]
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 1500000
test_speed = 115200
test_filter= embedded/*
test_ignore= native/*
; M5Unified is used only by test/embedded/ (M5.begin / M5.Display); native does not need it
lib_deps = ${env.lib_deps}
  m5stack/M5Unified

[Core]
extends = m5base
board = m5stack-core-esp32-16M

[Core2]
extends = m5base
board = m5stack-core2

[CoreS3]
extends = m5base
board = m5stack-cores3

[Fire]
extends = m5base
board = m5stack-fire

[StampS3]
;include M5Capsule, DinMeter
extends = m5base
board = m5stack-stamps3

[Dial]
extends = m5base
board = m5stack-stamps3
lib_deps = ${m5base.lib_deps}
  m5stack/M5Dial

[Atom]
;include AtomMatrix,AtomLite,AtomU
extends = m5base
board = m5stack-atom

[AtomS3]
;include AtomEchoS3R,AtomS3Lite,AtomS3U
extends = m5base
board = m5stack-atoms3

; Using ./boards/m5stack-atoms3r.json
[AtomS3R]
;include AtomEchoS3R
extends = m5base
board = m5stack-atoms3r

; Using ./boards/m5stack-nanoc6.json
[NanoC6]
extends = m5base
board = m5stack-nanoc6
board_build.partitions = default.csv

; Using ./boards/m5stack-nanoh2.json
[NanoH2]
extends = m5base
board = m5stack-nanoh2
board_build.partitions = default.csv

[StickCPlus]
extends = m5base
board = m5stick-c

; Using ./boards/m5stick-cplus2.json
[StickCPlus2]
extends = m5base
board = m5stick-cplus2

[StickS3]
extends = m5base
board = esp32-s3-devkitc-1
board_build.arduino.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_opi
build_flags =
    -DESP32S3
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[Cardputer]
extends = m5base
board = esp32-s3-devkitc-1
build_flags =
  -DESP32S3
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

[Tab5]
extends = m5base
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

[NessoN1]
extends = m5base
board = arduino_nesso_n1

[Paper]
extends = m5base
board = m5stack-fire

[CoreInk]
extends = m5base
board = m5stack-coreink

[sdl_common]
; SDL2 is no longer linked: it was needed by M5GFX (via M5Unified), which native tests no longer depend on
build_flags = -O3 -xc++ -std=c++14
platform = native
test_filter= native/*
test_ignore= embedded/*
lib_deps = ${env.lib_deps}

[sdl]
extends = sdl_common

; --------------------------------
;Choose framework
[arduino_latest]
platform = espressif32 @ 6.12.0
framework = arduino

[pioarduino_latest]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
framework = arduino

; --------------------------------
;Choose build options
[option_release]
build_type=release
build_flags = ${env.build_flags}   
  -DCORE_DEBUG_LEVEL=3
  -DLOG_LOCAL_LEVEL=3
  -DAPP_LOG_LEVEL=3
  -DM5_LOG_LEVEL=3

[option_log]
build_type=release
build_flags = ${env.build_flags} 
  -DCORE_DEBUG_LEVEL=5
  -DLOG_LOCAL_LEVEL=5
  -DAPP_LOG_LEVEL=5

[option_debug]
build_type=debug
build_flags = ${env.build_flags} 
  -DCORE_DEBUG_LEVEL=5
  -DLOG_LOCAL_LEVEL=5
  -DAPP_LOG_LEVEL=5
  -DDEBUG

[option_map]
build_type=release
build_flags = ${env.build_flags} 
  -DCORE_DEBUG_LEVEL=3
  -DLOG_LOCAL_LEVEL=3
  -DAPP_LOG_LEVEL=3
  -DM5_LOG_LEVEL=0
  -Wl,-Map,output.map

; --------------------------------
; UnitTest
[env:test_native]
extends = sdl, option_release
build_flags = ${sdl.build_flags} ${option_release.build_flags}

; Force the no-<chrono> log fallback (elapsed_time_t struct + millis() timestamp)
; that non-ESP32 Arduino cores select, so it is unit-tested on the host too
[env:test_native_nochrono]
extends = sdl, option_release
build_flags = ${sdl.build_flags} ${option_release.build_flags} -DM5UTILITY_HAS_USABLE_CHRONO=0

[env:test_Core]
extends=Core, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_Core2]
extends=Core2, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_CoreS3]
extends=CoreS3, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_Fire]
extends=Fire, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_StampS3]
extends=StampS3, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_Dial]
extends=Dial, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_Atom]
extends=Atom, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_AtomS3]
extends=AtomS3, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_AtomS3R]
extends=AtomS3R, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_NanoC6]
extends=NanoC6, option_release, pioarduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_NanoH2]
extends=NanoH2, option_release, pioarduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_StickCPlus]
extends=StickCPlus, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_StickCPlus2]
extends=StickCPlus2, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_StickS3]
extends=StickS3, option_release, arduino_latest
build_flags = ${StickS3.build_flags}
  ${option_release.build_flags}

[env:test_Cardputer]
extends=Cardputer, option_release, arduino_latest
build_flags = ${Cardputer.build_flags}
  ${option_release.build_flags}

[env:test_Tab5]
extends=Tab5, option_release, pioarduino_latest
build_flags = ${Tab5.build_flags}
  ${option_release.build_flags}

[env:test_NessoN1]
extends=NessoN1, option_release, pioarduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_Paper]
extends=Paper, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}

[env:test_CoreInk]
extends=CoreInk, option_release, arduino_latest
build_flags = ${env.build_flags} ${option_release.build_flags}
